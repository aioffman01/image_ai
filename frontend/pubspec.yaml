name: local_ocr_app
description: "A new Flutter project with local OCR and FastAPI backend communication."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  google_mlkit_text_recognition: ^0.11.0
  google_mlkit_object_detection: ^0.11.0
  google_mlkit_image_labeling: 0.10.0
  tflite_flutter: ^0.10.4
  file_picker: ^11.0.2
  image_picker: ^1.2.3
  platform_ocr: ^1.0.0
  exif: ^3.3.0
  flutter_map: ^8.3.1
  latlong2: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
